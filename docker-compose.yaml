# =============================================
# UrbanPulse VN — Core Docker Compose
# =============================================
# Services: PostgreSQL, MinIO, Trino, Redis, Nessie
# RAM: ~2.1GB total (safe for 16GB machine)
#
# Usage:
#   make up-core          # start all core services
#   docker compose ps     # check status

networks:
  urbanpulse-net:
    name: urbanpulse-net
    driver: bridge

volumes:
  postgres-data:
    driver: local
  minio-data:
    driver: local
  nessie-data:
    driver: local

services:
  # ── PostgreSQL 15 ──────────────────────────────────
  # Data Warehouse: bronze/silver/gold/sandbox schemas
  postgres:
    image: postgres:15-alpine
    container_name: urbanpulse-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-urbanpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-urbanpulse_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-urbanpulse}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-urbanpulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - urbanpulse-net

  # ── MinIO (S3-compatible Object Storage) ───────────
  # Data Lake: raw/, processed/, iceberg/ buckets
  minio:
    image: minio/minio:latest
    container_name: urbanpulse-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - urbanpulse-net

  # ── MinIO Client (Init Buckets) ────────────────────
  # One-shot: creates required buckets then exits
  minio-init:
    image: minio/mc:latest
    container_name: urbanpulse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb myminio/raw --ignore-existing;
      mc mb myminio/processed --ignore-existing;
      mc mb myminio/iceberg --ignore-existing;
      mc mb myminio/mlflow-artifacts --ignore-existing;
      echo '✅ MinIO buckets created: raw, processed, iceberg, mlflow-artifacts';
      exit 0;
      "
    networks:
      - urbanpulse-net

  # ── Nessie (Iceberg Catalog — Git for Data) ───────
  # REST Catalog for Apache Iceberg table versioning
  nessie:
    image: projectnessie/nessie:latest
    container_name: urbanpulse-nessie
    restart: unless-stopped
    ports:
      - "${NESSIE_PORT:-19120}:19120"
    environment:
      - NESSIE_VERSION_STORE_TYPE=IN_MEMORY
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v2/config"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - urbanpulse-net

  # ── Trino (Distributed SQL Query Engine) ───────────
  # Queries data across MinIO/Iceberg via Nessie catalog
  trino:
    image: trinodb/trino:latest
    container_name: urbanpulse-trino
    restart: unless-stopped
    ports:
      - "${TRINO_PORT:-8090}:8080"
    volumes:
      - ./trino/etc:/etc/trino:ro
    depends_on:
      nessie:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - urbanpulse-net

  # ── Redis (In-memory Cache) ────────────────────────
  # Crawler fallback cache + API rate-limit buffer
  redis:
    image: redis:7-alpine
    container_name: urbanpulse-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - urbanpulse-net
